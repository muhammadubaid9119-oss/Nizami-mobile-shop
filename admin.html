<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Nizami Mobile Shop</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
input { padding:8px; margin:5px 0; width:250px; }
button { padding:8px 15px; background:green; color:white; border:none; border-radius:5px; cursor:pointer; }
.product { border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:10px; background:white; }
img { width:120px; }
</style>
</head>
<body>

<h2>Admin Panel - Add Product</h2>

<input type="text" id="name" placeholder="Phone Name"><br>
<input type="text" id="price" placeholder="Price"><br>
<input type="file" id="image" accept="image/*"><br><br>

<button onclick="addProduct()">Add Product</button>

<h3>Saved Products</h3>
<div id="productList"></div>

<script>

function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let imageInput = document.getElementById("image");

    if(name === "" || price === "" || !imageInput.files[0]){
        alert("Sab details bharo");
        return;
    }

    let file = imageInput.files[0];
    let reader = new FileReader();

    reader.onload = function() {
        let product = {
            name: name,
            price: price,
            image: reader.result
        };

        let products = JSON.parse(localStorage.getItem("products")) || [];
        products.push(product);
        localStorage.setItem("products", JSON.stringify(products));

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";

        displayProducts();
    }

    reader.readAsDataURL(file);
}

function displayProducts() {
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let list = document.getElementById("productList");
    list.innerHTML = "";

    products.forEach((p, index) => {
        list.innerHTML += `
            <div class="product">
                <h4>${p.name}</h4>
                <img src="${p.image}">
                <p>₹${p.price}</p>
                <button onclick="deleteProduct(${index})">Delete</button>
            </div>
        `;
    });
}

function deleteProduct(index) {
    let products = JSON.parse(localStorage.getItem("products")) || [];
    products.splice(index, 1);
    localStorage.setItem("products", JSON.stringify(products));
    displayProducts();
}

displayProducts();

</script>

</body>
</html>
