<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nizami Mobile Shop</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f1f3f6;
}

/* Header */

header{
background:#131921;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
margin-right:20px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:10px;
border-radius:4px;
border:none;
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:green;
font-weight:bold;
margin:8px 0;
}

button{
background:#ff9900;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#f08804;
}

</style>
</head>

<body>

<header>
<div class="logo">Nizami Mobile Shop</div>
<div class="search">
<input type="text" id="search" placeholder="Search Mobile...">
</div>
</header>

<div class="products" id="productList">

<!-- Samsung -->

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s23-5g-1.jpg" onerror="this.src='https://via.placeholder.com/200x200?text=Mobile'">
<h3>Samsung Galaxy S23</h3>
<div class="price">₹74,999</div>
<button onclick="order('Samsung Galaxy S23')">Order Now</button>
</div>

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s22-5g-1.jpg" onerror="this.src='https://via.placeholder.com/200x200?text=Mobile'">
<h3>Samsung Galaxy S22</h3>
<div class="price">₹64,999</div>
<button onclick="order('Samsung Galaxy S22')">Order Now</button>
</div>

<div class="price">₹69,999</div>
<button onclick="order('iPhone 14')">Order Now</button>
</div>

<h3>iPhone 13</h3>
<div class="price">₹59,999</div>
<button onclick="order('iPhone 13')">Order Now</button>
</div>

<!-- OnePlus -->

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/oneplus/oneplus-11-1.jpg" onerror="this.src='https://via.placeholder.com/200x200?text=Mobile'">
<h3>OnePlus 11</h3>
<div class="price">₹56,999</div>
<button onclick="order('OnePlus 11')">Order Now</button>
</div>

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/oneplus/oneplus-10-pro-1.jpg" onerror="this.src='https://via.placeholder.com/200x200?text=Mobile'">
<h3>OnePlus 10 Pro</h3>
<div class="price">₹52,999</div>
<button onclick="order('OnePlus 10 Pro')">Order Now</button>
</div>
