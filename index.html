<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Nizami Mobile Shop</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="header">

<h2>Nizami Shop</h2>

<input type="text" placeholder="Search mobiles">

<div class="cart">
🛒 <span id="cart-count">0</span>
</div>

</div>

</header>

<!-- banner slider -->

<div class="slider">

<img src="https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd">

</div>

<!-- brands -->

<section class="brands">

<div class="brand">
<img src="https://img.icons8.com/color/96/iphone.png">
<p>iPhone</p>
</div>

<div class="brand">
<img src="https://img.icons8.com/color/96/samsung.png">
<p>Samsung</p>
</div>

<div class="brand">
<img src="https://img.icons8.com/color/96/vivo.png">
<p>Vivo</p>
</div>

<div class="brand">
<img src="https://img.icons8.com/color/96/oppo.png">
<p>Oppo</p>
</div>

<div class="brand">
<img src="https://img.icons8.com/color/96/google.png">
<p>Pixel</p>
</div>

</section>

<!-- color section -->

<h2 class="title">Shop your vibe</h2>

<div class="colors">

<div class="color black">Black</div>
<div class="color pink">Pink</div>
<div class="color green">Green</div>
<div class="color blue">Blue</div>

</div>

<!-- material section -->

<h2 class="title">Shop by material</h2>

<div class="materials">

<div class="material">Leather</div>
<div class="material">Glass</div>
<div class="material">Matte</div>

</div>

<!-- premium phones -->

<h2 class="title">Premium Phones</h2>

<section class="phones" id="phones"></section>

<!-- sale banner -->

<div class="sale">

<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97">

</div>

<!-- upcoming launches -->

<h2 class="title">Upcoming Launches</h2>

<div class="launch">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<img src="https://images.unsplash.com/photo-1510557880182-3c1b02c44a7b">

<img src="https://images.unsplash.com/photo-1495435229349-e86db7bfa013">

</div>

<footer>

<p>© Nizami Mobile Shop</p>

</footer>

<script src="script.js"></script>

</body>
</html>
