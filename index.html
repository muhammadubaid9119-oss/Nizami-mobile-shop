<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nizami Mobile Shop</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
}

/* HEADER */

.top-header{
background:#131921;
color:white;
display:flex;
align-items:center;
gap:15px;
padding:10px;
}

.logo{
display:flex;
align-items:center;
gap:8px;
font-weight:bold;
font-size:20px;
}

.logo img{
width:35px;
border-radius:6px;
}

.search-box{
flex:1;
display:flex;
}

.search-box input{
width:100%;
padding:10px;
border:none;
}

.search-box button{
background:#febd69;
border:none;
padding:10px 15px;
}

.cart{
background:white;
color:black;
padding:6px 10px;
border-radius:6px;
font-weight:bold;
}

/* MENU */

.menu{
background:#232f3e;
color:white;
display:flex;
gap:20px;
padding:10px;
}

/* BANNER */

.banner img{
width:100%;
height:250px;
object-fit:cover;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:#007600;
font-weight:bold;
}

.rating{
color:#ffa41c;
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:6px;
}

.cartBtn{
background:#ff9900;
color:white;
}

.buyBtn{
background:#25D366;
color:white;
}

footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="top-header">

<div class="logo">
<img src="logo.png">
Nizami Mobile Shop
</div>

<div class="search-box">
<input type="text" id="searchBar" placeholder="Search mobiles">
<button>🔍</button>
</div>

<div class="cart">
🛒 Cart (<span id="cartCount">0</span>)
</div>

</div>

<div class="menu">
<div>All</div>
<div>Mobiles</div>
<div>Accessories</div>
<div>Deals</div>
<div>Best Sellers</div>
</div>

<div class="banner">
<img src="https://images.pexels.com/photos/4042808/pexels-photo-4042808.jpeg">
</div>

<div class="products" id="productGrid"></div>

<footer>
<p>Nizami Mobile Shop | Maudaha Hamirpur</p>
<p>Contact: 9119606562</p>
</footer>

<script>

let cart=[];

const basePhones=[

"Samsung Galaxy S23",
"Samsung Galaxy S24",
"iPhone 14",
"iPhone 15",
"OnePlus 11",
"OnePlus 12",
"Vivo V29",
"Vivo V30",
"Realme GT",
"Realme Narzo",
"Redmi Note 12",
"Redmi Note 13"

];

const products=[];

for(let i=0;i<100;i++){

let name=basePhones[i%basePhones.length]+" "+(i+1);

products.push({

name:name,
price:15000+Math.floor(Math.random()*90000),
rating:(Math.random()*2+3).toFixed(1),
image:"https://images.pexels.com/photos/6078125/pexels-photo-6078125.jpeg"

});

}

function displayProducts(list){

const grid=document.getElementById("productGrid");

grid.innerHTML="";

list.forEach(p=>{

grid.innerHTML+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="rating">⭐ ${p.rating}</div>

<p class="price">₹${p.price.toLocaleString()}</p>

<button class="cartBtn" onclick="addToCart('${p.name}')">Add To Cart</button>

<button class="buyBtn" onclick="buyPhone('${p.name}')">Buy Now</button>

</div>

`;

});

}

function addToCart(name){

cart.push(name);

document.getElementById("cartCount").innerText=cart.length;

}

function buyPhone(name){

const msg=encodeURIComponent("Hello I want to buy "+name);

window.open("https://wa.me/9119606562?text="+msg);

}

document.getElementById("searchBar").addEventListener("input",function(){

let value=this.value.toLowerCase();

let filtered=products.filter(p=>p.name.toLowerCase().includes(value));

displayProducts(filtered);

});

displayProducts(products);

</script>

</body>
</html>
