<!DOCTYPE html>
<html>
<head>
<title>Nizami Mobile Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

header{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    margin:0;
    color:#00c2cb;
}

.search-box{
    width:90%;
    margin:20px auto;
    display:block;
    padding:12px;
    border-radius:25px;
    border:1px solid #ccc;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:#00bcd4;
    font-weight:bold;
    font-size:18px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.cart-btn{
    background:#333;
    color:white;
}

.order-btn{
    background:#00bcd4;
    color:white;
}

.cart-section{
    background:white;
    padding:15px;
    margin:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<h2>Nizami Mobile Shop</h2>
<button onclick="showCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
</header>

<input type="text" class="search-box" placeholder="Search Mobile..." onkeyup="searchProduct()">

<div class="products" id="productList">

<div class="card" data-name="Samsung Galaxy S23">
<img src="images/s23.jpg">
<h3>Samsung Galaxy S23</h3>
<p class="price">₹74,999</p>
<button class="cart-btn" onclick="addToCart('Samsung Galaxy S23',74999)">Add to Cart</button>
<button class="order-btn" onclick="orderNow('Samsung Galaxy S23')">Order</button>
</div>

<div class="card" data-name="iPhone 14">
<img src="images/iphone14.jpg">
<h3>iPhone 14</h3>
<p class="price">₹69,999</p>
<button class="cart-btn" onclick="addToCart('iPhone 14',69999)">Add to Cart</button>
<button class="order-btn" onclick="orderNow('iPhone 14')">Order</button>
</div>

<div class="card" data-name="Vivo V29">
<img src="images/vivo.jpg">
<h3>Vivo V29</h3>
<p class="price">₹32,999</p>
<button class="cart-btn" onclick="addToCart('Vivo V29',32999)">Add to Cart</button>
<button class="order-btn" onclick="orderNow('Vivo V29')">Order</button>
</div>

</div>

<div id="cartSection" style="display:none" class="cart-section">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<h4>Total: ₹<span id="totalPrice">0</span></h4>
<button class="order-btn" onclick="whatsappCart()">Order Full Cart</button>
</div>

<script>
let cart=[];
let total=0;

function addToCart(name,price){
    cart.push(name+" - ₹"+price);
    total+=price;
    document.getElementById("cartCount").innerText=cart.length;
    alert(name+" Added to Cart");
}

function showCart(){
    let list="";
    cart.forEach(item=>{
        list+="<li>"+item+"</li>";
    });
    document.getElementById("cartItems").innerHTML=list;
    document.getElementById("totalPrice").innerText=total;
    document.getElementById("cartSection").style.display="block";
}

function orderNow(product){
    let number="919110606562";
    let message="I want to order "+product;
    window.open("https://wa.me/"+number+"?text="+encodeURIComponent(message));
}

function whatsappCart(){
    let number="919110606562";
    let message="I want to order:\n"+cart.join("\n")+"\nTotal: ₹"+total;
    window.open("https://wa.me/"+number+"?text="+encodeURIComponent(message));
}

function searchProduct(){
    let input=document.querySelector(".search-box").value.toLowerCase();
    let cards=document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name=card.getAttribute("data-name").toLowerCase();
        if(name.includes(input)){
            card.style.display="block";
        }else{
            card.style.display="none";
        }
    });
}
</script>

</body>
</html>
