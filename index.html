<!DOCTYPE html>
<html>
<head>
<title>Nizami Mobile Shop</title>

<style>

body{font-family:Arial;margin:0;background:#f2f2f2}

header{background:#0a0a23;color:white;text-align:center;padding:20px}

.banner{width:100%;height:200px;overflow:hidden}

.banner img{width:100%;height:200px;object-fit:cover}

.search{text-align:center;margin:20px}

.search input{padding:10px;width:80%;border-radius:8px;border:1px solid #ccc}

.categories{text-align:center;margin:10px}

.categories button{background:#007bff}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1)
}

.card img{width:100%;border-radius:10px}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:6px;
margin:5px;
cursor:pointer
}

.cart{
background:white;
padding:15px;
margin:20px;
border-radius:10px
}

#adminPanel{
display:none;
background:white;
padding:20px;
margin:20px;
border-radius:10px
}

.ai-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6600
}

#ai-box{
position:fixed;
bottom:80px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
display:none;
width:200px
}

</style>
</head>

<body>

<header>
<h1>Nizami Mobile Shop</h1>
<p>Maudaha Hamirpur</p>
</header>

<div class="banner">
<img id="slider" src="https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s23-1.jpg">
</div>

<div class="search">
<input id="search" placeholder="Search Mobile..." onkeyup="searchPhone()">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('Samsung')">Samsung</button>
<button onclick="filterCategory('iPhone')">iPhone</button>
<button onclick="filterCategory('Redmi')">Redmi</button>
</div>

<div id="products" class="products"></div>

<div class="cart">
<h2>Cart</h2>
<div id="cart"></div>
<button onclick="order()">Order on WhatsApp</button>
</div>

<button onclick="adminLogin()">Admin</button>

<div id="adminPanel">

<h2>Admin Panel</h2>

<input id="pname" placeholder="Phone Name"><br><br>

<input id="pprice" placeholder="Price"><br><br>

<input id="pcategory" placeholder="Category"><br><br>

<input type="file" id="pimage"><br><br>

<button onclick="addPhone()">Add Phone</button>

</div>

<button class="ai-btn" onclick="toggleAI()">AI</button>

<div id="ai-box">
<input id="ai-input" placeholder="Ask AI">
<button onclick="aiReply()">Ask</button>
<p id="ai-response"></p>
</div>

<script>

let banners=[
"https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s23-1.jpg",
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg"
];

let b=0;

setInterval(()=>{
b=(b+1)%banners.length;
document.getElementById("slider").src=banners[b];
},3000);

let phones=JSON.parse(localStorage.getItem("phones"))||[

{name:"Samsung S23",price:75000,category:"Samsung",image:"https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s23-1.jpg"},

{name:"iPhone 14",price:70000,category:"iPhone",image:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg"},

{name:"Redmi Note 13",price:18000,category:"Redmi",image:"https://fdn2.gsmarena.com/vv/pics/xiaomi/xiaomi-redmi-note-13-1.jpg"}

];

let cart=[];

function savePhones(){
localStorage.setItem("phones",JSON.stringify(phones));
}

function showPhones(list=phones){

let html="";

list.forEach(p=>{

html+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.category}</p>
<p>₹${p.price}</p>
<button onclick="addCart('${p.name}',${p.price})">Add to Cart</button>
</div>
`;

});

document.getElementById("products").innerHTML=html;

}

function filterCategory(cat){

if(cat=="all") showPhones();

else showPhones(phones.filter(p=>p.category==cat));

}

function addCart(name,price){

cart.push({name,price});

let html="";

cart.forEach(i=>{
html+=`<p>${i.name} - ₹${i.price}</p>`;
});

document.getElementById("cart").innerHTML=html;

}

function order(){

let number="919119606562";

let msg="Hello Nizami Mobile Shop I want:\n";

cart.forEach(i=>{
msg+=i.name+" ₹"+i.price+"\n";
});

window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));

}

function searchPhone(){

let input=document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(input)?"block":"none";
});

}

function adminLogin(){

let pass=prompt("Enter Admin Password");

if(pass=="1234"){
document.getElementById("adminPanel").style.display="block";
}

}

function addPhone(){

let name=document.getElementById("pname").value;

let price=document.getElementById("pprice").value;

let category=document.getElementById("pcategory").value;

let file=document.getElementById("pimage").files[0];

let reader=new FileReader();

reader.onload=function(e){

phones.push({name,price,category,image:e.target.result});

savePhones();

showPhones();

};

if(file) reader.readAsDataURL(file);

}

function toggleAI(){

let box=document.getElementById("ai-box");

box.style.display=box.style.display==="block"?"none":"block";

}

function aiReply(){

let q=document.getElementById("ai-input").value.toLowerCase();

let r="";

if(q.includes("iphone")) r="iPhone phones available.";
else if(q.includes("samsung")) r="Samsung mobiles available.";
else if(q.includes("redmi")) r="Redmi mobiles available.";
else r="Please contact on WhatsApp.";

document.getElementById("ai-response").innerText=r;

}

showPhones();

</script>

</body>
    </html>
