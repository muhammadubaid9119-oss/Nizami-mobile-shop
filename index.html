<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nizami Mobile Shop</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */

header{
background:#131921;
color:white;
display:flex;
align-items:center;
padding:15px;
gap:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:4px;
}

/* MENU */

.menu{
background:#232f3e;
padding:10px;
text-align:center;
}

.menu button{
background:#37475a;
color:white;
border:none;
padding:8px 15px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#ff9900;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
padding:15px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
position:relative;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:3px 8px;
font-size:12px;
border-radius:5px;
}

.rating{
color:orange;
}

.price{
color:green;
font-weight:bold;
margin:8px 0;
}

button{
background:#ff9900;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#f08804;
}

/* CART */

#cart{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* ADMIN */

#admin{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<div class="logo">Nizami Mobile Shop</div>
<div class="search">
<input type="text" id="search" placeholder="Search Mobile">
</div>
</header>

<div class="menu">
<button onclick="filter('all')">All</button>
<button onclick="filter('Samsung')">Samsung</button>
<button onclick="filter('Apple')">Apple</button>
<button onclick="filter('OnePlus')">OnePlus</button>
<button onclick="filter('Xiaomi')">Xiaomi</button>
<button onclick="filter('Vivo')">Vivo</button>
<button onclick="filter('Realme')">Realme</button>
</div>

<div class="products" id="products"></div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="order()">Order on WhatsApp</button>
</div>

<div id="admin">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Phone Name"><br><br>
<input id="pprice" placeholder="Price"><br><br>
<input id="pbrand" placeholder="Brand"><br><br>
<input type="file" id="pimg"><br><br>

<button onclick="addPhone()">Add Phone</button>

</div>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>

let phones=[

{name:"Samsung Galaxy S23",price:74999,brand:"Samsung",img:"https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s23-5g-1.jpg"},
{name:"Samsung Galaxy S22",price:65999,brand:"Samsung",img:"https://fdn2.gsmarena.com/vv/pics/samsung/samsung-galaxy-s22-1.jpg"},

{name:"iPhone 14",price:69999,brand:"Apple",img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg"},
{name:"iPhone 13",price:59999,brand:"Apple",img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-01.jpg"},

{name:"OnePlus 11",price:56999,brand:"OnePlus",img:"https://fdn2.gsmarena.com/vv/pics/oneplus/oneplus-11-1.jpg"},
{name:"OnePlus Nord 3",price:32999,brand:"OnePlus",img:"https://fdn2.gsmarena.com/vv/pics/oneplus/oneplus-nord-3-1.jpg"},

{name:"Xiaomi 13",price:49999,brand:"Xiaomi",img:"https://fdn2.gsmarena.com/vv/pics/xiaomi/xiaomi-13-1.jpg"},
{name:"Redmi Note 12",price:15999,brand:"Xiaomi",img:"https://fdn2.gsmarena.com/vv/pics/xiaomi/xiaomi-redmi-note-12-1.jpg"},

{name:"Vivo X90",price:59999,brand:"Vivo",img:"https://fdn2.gsmarena.com/vv/pics/vivo/vivo-x90-1.jpg"},
{name:"Vivo V27",price:32999,brand:"Vivo",img:"https://fdn2.gsmarena.com/vv/pics/vivo/vivo-v27-1.jpg"},

{name:"Realme GT 3",price:36999,brand:"Realme",img:"https://fdn2.gsmarena.com/vv/pics/realme/realme-gt3-1.jpg"},
{name:"Realme 11 Pro",price:23999,brand:"Realme",img:"https://fdn2.gsmarena.com/vv/pics/realme/realme-11-pro-1.jpg"}

]

let cart=[]

function showPhones(){

let html=""

phones.forEach((p,i)=>{

html+=`

<div class="card" data-brand="${p.brand}">

<div class="badge">SALE</div>

<img src="${p.img}" onerror="this.src='https://picsum.photos/300?random=${i}'">

<h3>${p.name}</h3>

<div class="rating">★★★★☆</div>

<div class="price">₹${p.price}</div>

<button onclick="addCart(${i})">Add to Cart</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}

showPhones()

function addCart(i){

cart.push(phones[i])

let html=""

cart.forEach(p=>{
html+=p.name+" - ₹"+p.price+"<br>"
})

document.getElementById("cart-items").innerHTML=html

}

function order(){

let msg="Hello I want to order:%0A"

cart.forEach(p=>{
msg+=p.name+" ₹"+p.price+"%0A"
})

window.open("https://wa.me/91XXXXXXXXXX?text="+msg)

}

function filter(brand){

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

if(brand=="all" || card.dataset.brand==brand)
card.style.display="block"
else
card.style.display="none"

})

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(value)?"block":"none"

})

})

function addPhone(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let brand=document.getElementById("pbrand").value
let img=document.getElementById("pimg").files[0]

let reader=new FileReader()

reader.onload=function(){

phones.push({
name:name,
price:price,
brand:brand,
img:reader.result
})

showPhones()

}

reader.readAsDataURL(img)

}

</script>

</body>
</html>
