<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nizami UltraPro Mobile Shop</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#e0f7fa,#fce4ec);
}

header{
background:#0a0a23;
color:white;
padding:15px;
text-align:center;
}

.search{
padding:10px;
background:white;
text-align:center;
}

input,select{
padding:8px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

button{
padding:8px;
border:none;
background:#0a0a23;
color:white;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#ff6600;
}

#cart{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

#details{
display:none;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
text-align:center;
}

.banner img{
width:100%;
height:220px;
object-fit:cover;
}

</style>
</head>

<body>

<header>
<h1>Nizami Mobile Shop</h1>
</header>

<div class="banner">
<img id="slider"
src="https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-s23-ultra.jpg"
onerror="this.src='https://via.placeholder.com/1200x220?text=Nizami+Mobile+Shop'">
</div>

<div class="search">
<input id="search" placeholder="Search Phone">
<select id="category">
<option value="">All</option>
<option>Samsung</option>
<option>Apple</option>
<option>OnePlus</option>
<option>Vivo</option>
<option>Oppo</option>
<option>Realme</option>
<option>Motorola</option>
<option>Google</option>
</select>

<button onclick="showPhones()">Search</button>
</div>

<div class="container" id="phones"></div>

<div id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<button onclick="order()">Order on WhatsApp</button>
</div>

<div id="details">
<img id="dimg" width="200">
<h3 id="dname"></h3>
<p id="dprice"></p>
<p id="dscreen"></p>
<p id="dbattery"></p>
<p id="dcamera"></p>
<button onclick="closeDetails()">Close</button>
</div>

<script>

/* Banner Slider */

let banners=[
"https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-s23-ultra.jpg",
"https://fdn2.gsmarena.com/vv/bigpic/apple-iphone-15-pro-max.jpg",
"https://fdn2.gsmarena.com/vv/bigpic/google-pixel-8-pro.jpg"
]

let b=0

setInterval(()=>{
b=(b+1)%banners.length

let img=document.getElementById("slider")

img.src=banners[b]

img.onerror=function(){
this.src="https://via.placeholder.com/1200x220?text=Nizami+Mobile+Shop"
}

},3000)


/* Phones Data */

let phones=[

{name:"Samsung Galaxy S23 Ultra",price:124999,image:"https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-s23-ultra.jpg",category:"Samsung",specs:{screen:"6.8 AMOLED",battery:"5000mAh",camera:"200MP"}},

{name:"iPhone 15 Pro Max",price:149999,image:"https://fdn2.gsmarena.com/vv/bigpic/apple-iphone-15-pro-max.jpg",category:"Apple",specs:{screen:"6.7 OLED",battery:"4323mAh",camera:"48MP"}},

{name:"OnePlus 12",price:81999,image:"https://fdn2.gsmarena.com/vv/bigpic/oneplus-12.jpg",category:"OnePlus",specs:{screen:"6.82 AMOLED",battery:"5400mAh",camera:"50MP"}},

{name:"Google Pixel 8 Pro",price:92999,image:"https://fdn2.gsmarena.com/vv/bigpic/google-pixel-8-pro.jpg",category:"Google",specs:{screen:"6.7 OLED",battery:"5050mAh",camera:"50MP"}},

{name:"Vivo X100 Pro",price:109999,image:"https://fdn2.gsmarena.com/vv/bigpic/vivo-x100-pro.jpg",category:"Vivo",specs:{screen:"6.78 AMOLED",battery:"5000mAh",camera:"50MP"}},

{name:"Realme GT 5 Pro",price:49999,image:"https://fdn2.gsmarena.com/vv/bigpic/realme-gt5-pro.jpg",category:"Realme",specs:{screen:"6.74 AMOLED",battery:"5400mAh",camera:"50MP"}}

]


let cart=[]


function showPhones(){

let s=document.getElementById("search").value.toLowerCase()

let c=document.getElementById("category").value

let html=""

phones.forEach(p=>{

if((p.name.toLowerCase().includes(s))&&(c==""||p.category==c)){

html+=`

<div class="card">

<img src="${p.image}" onerror="this.src='https://via.placeholder.com/300x300?text=Mobile'">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="showDetails('${p.name}')">View</button>

<button onclick="addCart('${p.name}',${p.price})">Add</button>

</div>

`

}

})

document.getElementById("phones").innerHTML=html

}


function addCart(name,price){

cart.push({name,price})

let html=""

cart.forEach(i=>{

html+=i.name+" ₹"+i.price+"<br>"

})

document.getElementById("cart-items").innerHTML=html

}


function order(){

let msg="Hello I want:\n"

cart.forEach(i=>{

msg+=i.name+" ₹"+i.price+"\n"

})

window.open("https://wa.me/919119606562?text="+encodeURIComponent(msg))

}


function showDetails(name){

let p=phones.find(ph=>ph.name===name)

document.getElementById("details").style.display="block"

let img=document.getElementById("dimg")

img.src=p.image

img.onerror=function(){
this.src="https://via.placeholder.com/300x300?text=Mobile"
}

document.getElementById("dname").innerText=p.name
document.getElementById("dprice").innerText="₹"+p.price
document.getElementById("dscreen").innerText="Screen: "+p.specs.screen
document.getElementById("dbattery").innerText="Battery: "+p.specs.battery
document.getElementById("dcamera").innerText="Camera: "+p.specs.camera

}


function closeDetails(){

document.getElementById("details").style.display="none"

}


showPhones()

</script>

</body>
  </html>
